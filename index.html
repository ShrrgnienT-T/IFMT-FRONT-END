<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFMT Front-End | Exercícios JavaScript</title>
  <style>
    body {
      background: linear-gradient(120deg, #f8fafc 0%, #e0e7ef 100%);
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    .container {
      background: #fff;
      margin-top: 48px;
      padding: 32px 28px 24px 28px;
      border-radius: 18px;
      box-shadow: 0 4px 24px 0 #0001;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 2.1rem;
      color: #1a237e;
      margin-bottom: 0.2em;
      letter-spacing: 1px;
    }
    .desc {
      color: #374151;
      font-size: 1.08rem;
      margin-bottom: 1.5em;
    }
    .ex-list {
      list-style: none;
      padding: 0;
      margin: 0 0 1em 0;
    }
    .ex-list li {
      margin: 0.7em 0;
    }
    .ex-link {
      display: inline-block;
      background: #1a237e;
      color: #fff;
      padding: 0.7em 1.5em;
      border-radius: 8px;
      font-size: 1.08rem;
      text-decoration: none;
      font-weight: 500;
      box-shadow: 0 2px 8px #0002;
      transition: background 0.2s, transform 0.2s;
    }
    .ex-link:hover {
      background: #3949ab;
      transform: translateY(-2px) scale(1.04);
    }
    .footer {
      margin-top: 2.5em;
      color: #888;
      font-size: 0.98em;
    }
    @media (max-width: 600px) {
      .container {
        margin-top: 18px;
        padding: 18px 6vw 14px 6vw;
      }
      h1 {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✨ IFMT Front-End</h1>
    <div class="desc">
      Projeto de exercícios para praticar <b>JavaScript</b> na faculdade.<br>
      Selecione um exercício para começar:
    </div>
    <ul class="ex-list">
      <li><a class="ex-link" href="exercicio1.html">Exercício 1</a></li>
      <!-- Adicione mais exercícios aqui conforme necessário -->
    </ul>
    <div class="footer">
      <span>Desenvolvido para fins acadêmicos &copy; 2026</span>
    </div>
  </div>
</body>
</html>
